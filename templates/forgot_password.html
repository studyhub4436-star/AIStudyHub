<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;   /* Prevent scrolling */
}

     .box {
    width: min(90%, 400px);
    padding: 25px;
    background: #1e293b;
    border-radius: 10px;
    color: white;
}
  

     input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
  outline: none;
  font-size: 16px;
}
label {
  color: #cbd5e1;
  font-size: 14px;
}

     button {
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 10px;
  margin-top: 10px;
}

button:hover {
  background: #1d4ed8;
}
      * {
  box-sizing: border-box;
}

.password-field {
  position: relative;
  width: 100%;
}

.password-field input {
  width: 100%;
  display: block;
  padding: 15px 45px 15px 15px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.1);
  color: white;
  outline: none;
  box-sizing: border-box; /* IMPORTANT */
}

.eye {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #cbd5e1;
  font-size: 18px;
}
html {
    width: 100%;
    height: 100%;
    overflow: hidden;
}
    </style>
  </head>

  <body>
    <div class="box">
      <h2>Forgot Password</h2>

      <input type="email" id="email" placeholder="Email" />

      <button onclick="sendOTP()">Send OTP</button>

      <input type="text" id="otp" placeholder="OTP" />

      <div class="input-box">
        <label>New Password</label>

        <div class="password-field">
          <input
            type="password"
            id="password"
            placeholder="New Password"
            required
          />

          <span class="eye" onclick="togglePassword('password')">👁</span>
        </div>
      </div>

      <div class="input-box">
        <label>Confirm Password</label>

        <div class="password-field">
          <input
            type="password"
            id="confirm"
            placeholder="Confirm Password"
            required
          />

          <span class="eye" onclick="togglePassword('confirm')">👁</span>
        </div>
      </div>

      <button onclick="resetPassword()">Reset Password</button>
    </div>

    <script>
      function sendOTP() {
        fetch("/api/send-reset-otp", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            email: document.getElementById("email").value,
          }),
        })
          .then((r) => r.json())

          .then((data) => alert(data.message || data.error));
      }

      function resetPassword() {
        let p = document.getElementById("password").value;

        let c = document.getElementById("confirm").value;

        if (p != c) {
          alert("Passwords do not match");

          return;
        }

        fetch("/api/reset-password", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            email: document.getElementById("email").value,

            otp: document.getElementById("otp").value,

            password: p,
          }),
        })
          .then((r) => r.json())

          .then((data) => {
            alert(data.message || data.error);

            if (data.success) {
              window.location = "/login";
            }
          });
      }
  function togglePassword(id) {
    const input = document.getElementById(id);
    if (!input) return;

    input.type = (input.type === "password") ? "text" : "password";
  }
    </script>
  </body>
</html>
