<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Hub | Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    padding:40px;
    color:white;
}

body::before{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    background:#00ffff;
    top:-100px;
    left:-100px;
    opacity:.15;
    filter:blur(70px);
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    background:#00ffff;
    bottom:-100px;
    right:-100px;
    opacity:.15;
    filter:blur(70px);
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    color:#00ffff;
    font-size:40px;
}

.header p{
    color:#cbd5e1;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-bottom:35px;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
}

.card h2{
    font-size:35px;
    color:#00ffff;
    margin-bottom:10px;
}

.card p{
    color:#cbd5e1;
}

.actions{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.action-btn{
    text-decoration:none;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    color:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    transition:.3s;
}

.action-btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px #00ffff55;
}

.logout{
    background:#00ffff;
    color:black;
    font-weight:600;
}

</style>
</head>
<body>

<div class="header">
    <h1>🚀 Admin Dashboard</h1>
    <p>AI Study Hub Administration Panel</p>
</div>

<div class="stats">

    <div class="card">
        <h2>{{ total_users }}</h2>
        <p>👥 Total Users</p>
    </div>

    <div class="card">
        <h2>{{ total_pdfs }}</h2>
        <p>📚 Total PDFs Uploaded</p>
    </div>

    <div class="card">
        <h2>{{ total_downloads }}</h2>
        <p>⬇️ Total Downloads</p>
    </div>

</div>

<div class="actions">
<a href="/dashboard" class="action-btn">
    📤 Upload PDF
</a>
    <a href="/admin/users" class="action-btn">
        👥 View All Users
    </a>

    <a href="/admin/pdfs" class="action-btn">
        📄 View All PDFs
    </a>

    <a href="/logout" class="action-btn logout">
        🚪 Logout
    </a>

</div>

</a>
</body>
</html>
