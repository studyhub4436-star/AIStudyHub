<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Hub | Register</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
padding:20px;
}

body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:#00ffff;
border-radius:50%;
top:-100px;
left:-100px;
opacity:.15;
filter:blur(70px);
}

body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background:#00ffff;
border-radius:50%;
bottom:-100px;
right:-100px;
opacity:.15;
filter:blur(70px);
}

.container{
width:450px;
position:relative;
z-index:2;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(25px);
padding:40px;
border-radius:30px;
box-shadow:0 8px 32px rgba(0,0,0,0.35);
}

.logo{
font-size:55px;
text-align:center;
margin-bottom:10px;
}

.card h1{
text-align:center;
color:#00ffff;
font-size:34px;
margin-bottom:10px;
}

.card p{
text-align:center;
color:#cbd5e1;
margin-bottom:30px;
}

.input-box{
margin-bottom:20px;
}

.input-box label{
display:block;
margin-bottom:8px;
color:white;
font-size:14px;
}

.input-box input,
.input-box select{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.1);
color:white;
font-size:15px;
}

.input-box input::placeholder{
color:#cbd5e1;
}

.input-box select option{
background:#1e293b;
color:white;
}

.otp-row{
display:flex;
gap:10px;
}

.send-otp-btn{
padding:14px;
border:none;
border-radius:15px;
background:#00ffff;
font-weight:600;
cursor:pointer;
}

.register-btn{
width:100%;
padding:15px;
border:none;
border-radius:40px;
background:#00ffff;
color:#000;
font-size:18px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.register-btn:hover{
box-shadow:0 0 25px #00ffff;
}

.login{
text-align:center;
margin-top:25px;
color:#cbd5e1;
}

.login a{
text-decoration:none;
color:#00ffff;
font-weight:600;
}
.input-box {
  position: relative;
}

.eye {
  position: absolute;
  right: 15px;
  top: 40px;
  cursor: pointer;
  user-select: none;
  color: #cbd5e1;
  font-size: 18px;
}

@media(max-width:500px){
.container{
width:100%;
}
.card{
padding:25px;
}
.otp-row{
flex-direction:column;
}
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">🎓</div>

<h1>AI Study Hub</h1>

<p>Create your account and start learning smarter</p>

<form id="registerForm">

<div class="input-box">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your name" required>
</div>

<div class="input-box">
<label>Email ID</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Email OTP</label>

<div class="otp-row">

<input
type="text"
id="otp"
placeholder="Enter OTP"
required>

<button
type="button"
class="send-otp-btn"
onclick="sendOTP()">
Send OTP
</button>

</div>

</div>

<div class="input-box">
<label>Select Branch</label>

<select id="branch" required>
<option value="">Choose Branch</option>
<option>CSE</option>
<option>CSE-AI</option>
<option>CSE-DS</option>
<option>IT</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
<option>CIVIL</option>
</select>

</div>

<div class="input-box">
<label>Select Year</label>

<select id="year" required>
<option value="">Choose Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>

</div>

<div class="input-box">
    <label>Password</label>
<input type="password" id="password" placeholder="Create password" required>
<span class="eye" onclick="togglePassword('password')">👁</span>
</div>

<div class="input-box">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm password" required>
<span class="eye" onclick="togglePassword('confirmPassword')">👁</span>
</div>

<button type="submit" class="register-btn">
Register
</button>

<div class="login">
Already have an account?
<a href="/login">Login</a>
</div>

</form>

</div>

</div>

<script>
let otpSent = false;

function sendOTP(){
    const email = document.getElementById("email").value;
    if(email === ""){
        alert("Please enter your email first.");
        return;
    }

    const sendBtn = document.querySelector(".send-otp-btn");
    sendBtn.disabled = true;
    sendBtn.innerText = "Sending...";

    fetch('/api/send-otp', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email: email })
    })
    .then(res => res.json())
    .then(data => {
        sendBtn.disabled = false;
        sendBtn.innerText = "Send OTP";
        if (data.success) {
            otpSent = true;
            alert("✅ " + data.message);
        } else {
            alert("❌ " + data.error);
        }
    })
    .catch(err => {
        sendBtn.disabled = false;
        sendBtn.innerText = "Send OTP";
        console.error(err);
        alert("❌ Failed to request OTP. Please try again.");
    });
}

document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const branch = document.getElementById("branch").value;
    const year = document.getElementById("year").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const otp = document.getElementById("otp").value;

    if(password !== confirmPassword){
        alert("Passwords do not match!");
        return;
    }

    if(!otpSent){
        alert("Please send OTP first.");
        return;
    }

    fetch('/api/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, branch, year, password, otp })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert("✅ Registration Successful! Please log in.");
            window.location.href = "/login";
        } else {
            alert("❌ " + data.error);
        }
    })
    .catch(err => {
        console.error(err);
        alert("❌ Registration failed. Please try again.");
    });
});
function togglePassword(id) {
    const input = document.getElementById(id);

    if (!input) return;

    if (input.type === "password") {
        input.type = "text";
    } else {
        input.type = "password";
    }
}
</script>

</body>
</html>
