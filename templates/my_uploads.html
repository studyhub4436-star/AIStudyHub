<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>My Uploads</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Poppins, sans-serif;
      }

      body {
        background: #0f172a;
        color: white;
        padding: 40px;
      }

      h1 {
        margin-bottom: 25px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
      }

      .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
      }

      .card h3 {
        margin-bottom: 10px;
      }

      .card p {
        margin: 6px 0;
        color: #cbd5e1;
      }

      .actions {
        margin-top: 15px;
      }

      .actions button {
        padding: 5px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 10px;
        font-weight: 600;
      }

      .preview {
        background: #0ea5e9;
        color: white;
      }

      .download {
        background: #22c55e;
        color: white;
      }

      .delete {
        background: #ef4444;
        color: white;
      }

      .back {
        display: inline-block;
        margin-bottom: 20px;
        text-decoration: none;
        color: white;
        background: #334155;
        padding: 10px 18px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <a href="/dashboard" class="back">⬅ Back to Dashboard</a>

    <h1>📤 My Uploads</h1>

    <div class="cards">
      {% for file in uploads %}

      <div class="card">
        <h3>{{file.title}}</h3>

        <p><b>Subject:</b> {{file.subject}}</p>

        <p><b>Branch:</b> {{file.branch}}</p>

        <p><b>Year:</b> {{file.year}}</p>

        <p><b>Downloads:</b> {{file.downloads_count}}</p>

        <div class="actions">
          <button
            class="preview"
            onclick="window.open('/preview/{{file._id}}','_blank')"
          >
            👁 Preview
          </button>

          <button
            class="download"
            onclick="window.location='/api/download/{{file._id}}'"
          >
            ⬇ Download
          </button>

          <button class="delete" onclick="deletePDF('{{file._id}}')">
            🗑 Delete
          </button>
        </div>
      </div>

      {% else %}

      <h2>No uploads found.</h2>

      {% endfor %}
    </div>

    <script>
      function deletePDF(id) {
        if (confirm("Are you sure you want to delete this PDF?")) {
          fetch("/delete-upload/" + id, {
            method: "POST",
          })
            .then((r) => r.json())

            .then((data) => {
              alert(data.message);

              if (data.success) {
                location.reload();
              }
            });
        }
      }
    </script>
  </body>
</html>
